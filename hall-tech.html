    <style>
        .tech-category-section { margin-bottom: 50px; }
        .tech-category-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .tech-category-card {
            background: var(--bg-card);
            border: 1px solid var(--border-dim);
            border-radius: 8px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tech-category-card:hover, .tech-category-card.active {
            border-color: var(--gold);
            background: rgba(200, 164, 92, 0.05);
        }
        .tech-category-icon { font-size: 36px; margin-bottom: 12px; }
        .tech-category-name { font-size: 15px; color: var(--gold); letter-spacing: 2px; margin-bottom: 8px; }
        .tech-category-count { font-size: 12px; color: var(--text-dim); }
        .tech-detail-section { margin-bottom: 50px; }
        .tech-detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-dim);
        }
        .tech-detail-title { font-size: 24px; color: var(--gold); letter-spacing: 3px; }
        .tech-detail-desc { font-size: 14px; color: var(--text-dim); max-width: 600px; }
        .ethnic-selector { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .ethnic-selector-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            padding: 10px;
            border-radius: 8px;
        }
        .ethnic-selector-item:hover { background: rgba(200, 164, 92, 0.1); }
        .ethnic-selector-item.active { background: rgba(200, 164, 92, 0.15); }
        .ethnic-selector-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid var(--border-dim);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            background: rgba(200, 164, 92, 0.1);
        }
        .ethnic-selector-item:hover .ethnic-selector-icon,
        .ethnic-selector-item.active .ethnic-selector-icon {
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(200, 164, 92, 0.3);
        }
        .ethnic-selector-icon img { width: 100%; height: 100%; object-fit: cover; }
        .ethnic-selector-name { margin-top: 8px; font-size: 12px; color: var(--text-dim); letter-spacing: 1px; transition: color 0.3s; }
        .ethnic-selector-item:hover .ethnic-selector-name,
        .ethnic-selector-item.active .ethnic-selector-name { color: var(--gold); }
        .ethnic-tech-card-container { position: relative; min-height: 300px; overflow: hidden; }
        .ethnic-tech-card {
            background: var(--bg-card);
            border: 1px solid var(--border-dim);
            border-radius: 8px;
            overflow: hidden;
            position: absolute;
            width: 100%;
            opacity: 0;
            transform: translateX(50px);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }
        .ethnic-tech-card.active {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
            position: relative;
        }
        .ethnic-tech-card.exit-left { opacity: 0; transform: translateX(-50px); }
        .ethnic-tech-card.exit-right { opacity: 0; transform: translateX(50px); }
        .ethnic-tech-header {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 25px;
            background: rgba(200, 164, 92, 0.05);
            border-bottom: 1px solid var(--border-dim);
        }
        .ethnic-tech-icon { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--gold); overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .ethnic-tech-icon img { width: 100%; height: 100%; object-fit: cover; }
        .ethnic-tech-name { font-size: 18px; color: var(--text-light); letter-spacing: 2px; }
        .ethnic-tech-body { padding: 25px; }
        .ethnic-tech-features { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .ethnic-tech-feature { padding: 15px; background: rgba(200, 164, 92, 0.05); border-radius: 6px; border-left: 3px solid var(--gold); }
        .ethnic-tech-feature-title { font-size: 14px; color: var(--gold); letter-spacing: 1px; margin-bottom: 8px; }
        .ethnic-tech-feature-desc { font-size: 13px; color: var(--text-dim); line-height: 1.7; }
        .ethnic-tech-buildings { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border-dim); }
        .ethnic-tech-buildings-title { font-size: 12px; color: var(--text-dim); letter-spacing: 1px; margin-bottom: 12px; }
        .ethnic-tech-building-tag {
            display: inline-block;
            padding: 6px 12px;
            margin-right: 10px;
            margin-bottom: 8px;
            font-size: 12px;
            color: var(--text-light);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            border: 1px solid var(--border-dim);
            transition: all 0.3s;
        }
        .ethnic-tech-building-tag:hover { border-color: var(--gold); color: var(--gold); }
        @media (max-width: 768px) { .ethnic-tech-features { grid-template-columns: 1fr; } }
        .charts-section { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 50px; }
        .chart-card { background: var(--bg-card); border: 1px solid var(--border-dim); border-radius: 8px; padding: 25px; }
        .chart-title { font-size: 16px; color: var(--text-light); letter-spacing: 3px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border-dim); }
        .tech-comparison-section { margin-top: 50px; }
        .tech-comparison-table { width: 100%; border-collapse: collapse; background: var(--bg-card); border-radius: 8px; overflow: hidden; }
        .tech-comparison-table th, .tech-comparison-table td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border-dim); }
        .tech-comparison-table th { background: rgba(200, 164, 92, 0.1); color: var(--gold); font-size: 13px; letter-spacing: 2px; font-weight: 400; }
        .tech-comparison-table td { font-size: 13px; color: var(--text-light); }
        .tech-comparison-table tr:hover td { background: rgba(200, 164, 92, 0.03); }
        .tech-tag { display: inline-block; padding: 3px 8px; margin: 2px; font-size: 11px; background: rgba(200, 164, 92, 0.15); color: var(--gold); border-radius: 3px; }
        @media (max-width: 1200px) { .tech-category-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { .tech-category-grid { grid-template-columns: 1fr; } .charts-section { grid-template-columns: 1fr; } }

        /* 展厅导航按钮 */
        .hall-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 60px 0 40px;
            border-top: 1px solid var(--border-dim);
            margin-top: 40px;
        }

        .hall-nav-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 15px 30px;
            background: var(--bg-card);
            border: 1px solid var(--border-dim);
            border-radius: 8px;
            color: var(--text-light);
            font-size: 14px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .hall-nav-btn:hover {
            border-color: var(--gold);
            background: rgba(200, 164, 92, 0.1);
            transform: translateY(-2px);
        }

        .hall-nav-btn.primary {
            background: linear-gradient(135deg, var(--gold), var(--vermillion));

            color: #fff;
        }

        .hall-nav-btn.primary:hover {
            box-shadow: 0 8px 25px rgba(200, 164, 92, 0.3);
        }

        .hall-nav-arrow {
            font-size: 18px;
        }

        function renderTechDetail() {
            const section = document.getElementById('techDetailSection');
            const cat = techCategories[currentCategory];
            const ethnics = Object.keys(cat.ethnicTechs);
            if (!currentEthnic || !ethnics.includes(currentEthnic)) { currentEthnic = ethnics[0]; previousEthnicIndex = 0; }
            section.innerHTML = 
                '<div class="tech-detail-header"><div class="tech-detail-title">' + cat.name + '</div>' +
                '<div class="tech-detail-desc">' + cat.desc + '</div></div>' +
                '<div class="ethnic-selector">' + ethnics.map((ethnic, index) =>

                    '<div class="ethnic-selector-name">' + ethnic + '</div></div>'
                ).join('') + '</div>' +
                '<div class="ethnic-tech-card-container">' + ethnics.map((ethnic, index) => 
                    '<div class="ethnic-tech-card ' + (ethnic === currentEthnic ? 'active' : '') + '" data-ethnic="' + ethnic + '" data-index="' + index + '">' +

                    ).join('') + '</div>' +
                    '<div class="ethnic-tech-buildings"><div class="ethnic-tech-buildings-title">代表建筑</div>' +
                    cat.ethnicTechs[ethnic].buildings.map(b => '<span class="ethnic-tech-building-tag">' + b + '</span>').join('') + '</div></div></div>'
                ).join('') + '</div>';
            section.querySelectorAll('.ethnic-selector-item').forEach(item => {
                item.addEventListener('click', function() {
                    const newEthnic = this.dataset.ethnic;
                    const newIndex = parseInt(this.dataset.index);
                    if (newEthnic === currentEthnic) return;
                    section.querySelectorAll('.ethnic-selector-item').forEach(s => s.classList.remove('active'));
                    this.classList.add('active');
                    switchEthnicCard(currentEthnic, newEthnic, previousEthnicIndex, newIndex);
                    currentEthnic = newEthnic;
                    previousEthnicIndex = newIndex;
                });
            });
        }

        function switchEthnicCard(oldEthnic, newEthnic, oldIndex, newIndex) {
            const container = document.querySelector('.ethnic-tech-card-container');
            const oldCard = container.querySelector('.ethnic-tech-card[data-ethnic="' + oldEthnic + '"]');
            const newCard = container.querySelector('.ethnic-tech-card[data-ethnic="' + newEthnic + '"]');
            if (!oldCard || !newCard) return;
            const direction = newIndex > oldIndex ? 'left' : 'right';
            oldCard.classList.remove('active');
            oldCard.classList.add(direction === 'left' ? 'exit-left' : 'exit-right');
            newCard.classList.remove('exit-left', 'exit-right');
            newCard.classList.add('active');
            setTimeout(() => { oldCard.classList.remove('exit-left', 'exit-right'); }, 500);
        }

        function initMatrixChart() {
            const chart = echarts.init(document.getElementById('techEthnicMatrix'));
            const techTypes = ['结构技术', '装饰艺术', '材料技术', '气候适应'];
            const ethnicSet = new Set();
            Object.values(techCategories).forEach(cat => { Object.keys(cat.ethnicTechs).forEach(ethnic => ethnicSet.add(ethnic)); });
            const ethnics = Array.from(ethnicSet);
            
            // 计算每个民族在每个技术类别的实际数量
            const matrixData = {};
            ethnics.forEach(ethnic => { matrixData[ethnic] = {}; techTypes.forEach(tech => { matrixData[ethnic][tech] = 0; }); });
            
            Object.entries(techCategories).forEach(([key, cat]) => {
                const techName = cat.name;
                Object.entries(cat.ethnicTechs).forEach(([ethnic, data]) => {
                    if (matrixData[ethnic]) { 
                        // 数量 = 特色数量 + 建筑数量
                        matrixData[ethnic][techName] = data.features.length + data.buildings.length; 
                    }
                });
            });
            
            // 找出最大值用于归一化
            let maxCount = 0;
            ethnics.forEach(ethnic => { 
                techTypes.forEach(tech => { 
                    if (matrixData[ethnic][tech] > maxCount) maxCount = matrixData[ethnic][tech]; 
                }); 
            });
            
            // 构建热力图数据 - 使用实际数量作为值
            const data = [];
            ethnics.forEach((ethnic, i) => { 
                techTypes.forEach((tech, j) => { 
                    const count = matrixData[ethnic][tech]; 
                    data.push([j, i, count]); 
                }); 
            });
            
            chart.setOption({
                backgroundColor: 'transparent',
                tooltip: { 
                    formatter: function(params) { 
                        const d = params.data; 
                        const ethnic = ethnics[d[1]]; 
                        const tech = techTypes[d[0]]; 
                        return '<strong style="color:#c8a45c">' + ethnic + '</strong> - ' + tech + '<br/>特色数量: ' + d[2]; 
                    } 
                },
                grid: { top: 70, right: 20, bottom: 60, left: 80 },
                xAxis: { 
                    type: 'category', 
                    data: techTypes, 
                    axisLine: { lineStyle: { color: 'rgba(200, 164, 92, 0.3)' } }, 
                    axisLabel: { color: '#9a958a', fontSize: 11 }, 
                    splitLine: { show: true, lineStyle: { color: 'rgba(200, 164, 92, 0.1)' } } 
                },
                yAxis: { 
                    type: 'category', 
                    data: ethnics, 
                    axisLine: { lineStyle: { color: 'rgba(200, 164, 92, 0.3)' } }, 
                    axisLabel: { color: '#9a958a', fontSize: 11 }, 
                    splitLine: { show: true, lineStyle: { color: 'rgba(200, 164, 92, 0.1)' } } 
                },
                visualMap: { 
                    min: 0, 
                    max: maxCount, 
                    calculable: true, 
                    orient: 'horizontal', 
                    left: 'center', 
                    bottom: 5, 
                    inRange: { 
                        color: ['#2a2520', '#4a4030', '#7a6040', '#b89050', '#e8c060', '#ffe080'] 
                    }, 
                    textStyle: { color: '#9a958a' }, 
                    text: ['丰富', '较少'] 
                },
                series: [{ 
                    type: 'heatmap', 
                    data: data, 
                    label: { 
                        show: false
                    }, 
                    itemStyle: { 
                        borderColor: 'rgba(10, 9, 8, 0.5)', 
                        borderWidth: 1 
                    }, 
                    emphasis: { 
                        itemStyle: { 
                            shadowBlur: 10,
                            borderColor: '#c8a45c',
                            borderWidth: 2
                        } 
                    } 
                }]
            });
            return chart;
        }

            };
            const nodes = [];
            const links = [];
            let nodeIndex = 0;
            const mainTypeIndices = {};
            const subTypeIndices = {};
            const buildingIndices = {};
            nodes.push({ name: '云南古建筑结构', itemStyle: { color: '#c8a45c' }, x: 300, y: 25 });
            const mainY = 100;
            const subY = 250;
            const buildingY = 400;
            Object.entries(structureData).forEach(([mainType, mainData], mainIndex) => {
                const mainNodeIndex = nodeIndex + 1;
                mainTypeIndices[mainType] = mainNodeIndex;
                nodes.push({ name: mainType, itemStyle: { color: mainData.color }, x: 150 + mainIndex * 150, y: mainY });
                links.push({ source: 0, target: mainNodeIndex, value: 10, lineStyle: { color: mainData.color, opacity: 0.6 } });
                nodeIndex++;
                Object.entries(mainData.subTypes).forEach(([subType, subData], subIndex) => {
                    const subNodeIndex = nodeIndex + 1;
                    const subKey = mainType + '_' + subType;
                    subTypeIndices[subKey] = subNodeIndex;
                    nodes.push({ name: subType, itemStyle: { color: mainData.color, opacity: 0.8 }, x: 50 + subIndex * 120 + mainIndex * 200, y: subY });
                    links.push({ source: mainTypeIndices[mainType], target: subNodeIndex, value: 5, lineStyle: { color: mainData.color, opacity: 0.4 } });
                    nodeIndex++;
                    subData.buildings.slice(0, 3).forEach((building, bIndex) => {
                        if (!buildingIndices[building]) {
                            const bNodeIndex = nodeIndex + 1;
                            buildingIndices[building] = bNodeIndex;
                            nodes.push({ name: building, itemStyle: { color: '#9a958a' }, x: 30 + bIndex * 80 + subIndex * 120 + mainIndex * 200, y: buildingY, label: { fontSize: 10 } });
                            links.push({ source: subTypeIndices[subKey], target: bNodeIndex, value: 1, lineStyle: { color: mainData.color, opacity: 0.3 } });
                            nodeIndex++;
                        }
                    });
                });
            });
            chart.setOption({
                backgroundColor: 'transparent',
                tooltip: { trigger: 'item', formatter: '{b}' },
                series: [{ type: 'sankey', layout: 'none', nodeWidth: 20, nodeGap: 12, layoutIterations: 0, focusNodeAdjacency: 'allEdges', lineStyle: { color: 'gradient', curveness: 0.5 }, label: { color: '#9a958a', fontSize: 11 }, data: nodes, links: links }]
            });
            return chart;
        }

                { ethnic: '怒族', structure: '千脚落地式干栏、木楞房', decoration: '竹编藤编、图腾装饰', layout: '山地干栏、聚落式' },
                { ethnic: '阿昌族', structure: '汉傣融合建筑、土司衙署', decoration: '多民族融合装饰、木雕', layout: '合院式、土司衙署布局' },
                { ethnic: '苗族', structure: '风雨桥技术、石拱廊桥', decoration: '风雨桥装饰、多民族融合', layout: '廊桥式、多民族聚落' },
                { ethnic: '哈尼族', structure: '风雨桥建筑、梯田生态', decoration: '风雨桥装饰、梯田文化', layout: '廊桥式、梯田聚落' },
                { ethnic: '独龙族', structure: '井干式木屋、千脚落地', decoration: '木雕装饰、自然图腾', layout: '山地聚落、井干式' },
                { ethnic: '回族', structure: '砖木混合、外汉内回', decoration: '伊斯兰纹样、外汉内回', layout: '合院式、店宅合一' },
                { ethnic: '壮族', structure: '干栏式木楼、风雨桥技术', decoration: '壮锦图案、铜鼓装饰', layout: '干栏式、廊桥式' }
            ];
            tbody.innerHTML = comparisonData.map(row => 
                '<tr><td style="color:#c8a45c;font-weight:500">' + row.ethnic + '</td>' +
                '<td>' + row.structure.split('、').map(t => '<span class="tech-tag">' + t + '</span>').join('') + '</td>' +
                '<td>' + row.decoration.split('、').map(t => '<span class="tech-tag">' + t + '</span>').join('') + '</td>' +
                '<td>' + row.layout.split('、').map(t => '<span class="tech-tag">' + t + '</span>').join('') + '</td></tr>'
            ).join('');
        }

        let matrixChart = null;
        let structureChart = null;

        function init() {
            renderTechCategories();
            renderTechDetail();
            matrixChart = initMatrixChart();
            structureChart = initStructureChart();
            renderComparisonTable();
        }

        window.addEventListener('resize', function() {
            if (matrixChart) matrixChart.resize();
            if (structureChart) structureChart.resize();
        });

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
