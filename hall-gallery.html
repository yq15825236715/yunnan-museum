<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>建筑图鉴 - 滇风·民族筑语</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- 3D模型查看器 -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer@3.3.0/dist/model-viewer.min.js"></script>
    <style>
        /* 3D模型容器 */
        model-viewer {
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #0d0c0a, #0a0908);
            --poster-color: transparent;
        }
        
        model-viewer::default-progress-bar {
            background: rgba(200, 164, 92, 0.3);
        }
        
        .model-viewer-container {
            width: 100%;
            height: 400px;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .model-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }
        
        .model-btn {
            padding: 8px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-dim);
            color: var(--text-light);
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        
        .model-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
        }
        
        .model-badge {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(200, 164, 92, 0.2);
            border: 1px solid var(--gold);
            color: var(--gold);
            border-radius: 20px;
            font-size: 11px;
            margin-bottom: 15px;
        }
        
        .gallery-filters {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 40px;
            padding: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-dim);
            border-radius: 8px;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-label {
            font-size: 12px;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .filter-select {
            padding: 8px 15px;
            background: var(--bg-darkest);
            border: 1px solid var(--border-dim);
            border-radius: 4px;
            color: var(--text-light);
            font-family: var(--font-serif);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-select:hover {
            border-color: var(--gold);
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--gold);
        }

        .filter-reset-btn {
            padding: 8px 20px;
            background: transparent;
            border: 1px solid var(--border-dim);
            border-radius: 4px;
            color: var(--text-dim);
            font-family: var(--font-serif);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .filter-reset-btn:hover {
            border-color: var(--vermillion);
            color: var(--vermillion);
            background: rgba(164, 51, 48, 0.1);
        }

        .filter-reset-btn svg {
            width: 14px;
            height: 14px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
        }

        .gallery-card {
            position: relative;
            background: var(--bg-card);
            border: 1px solid var(--border-dim);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s;
        }

        .gallery-card:hover {
            border-color: var(--gold);
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(200, 164, 92, 0.15);
        }

        .gallery-enamel {
            position: relative;
            width: 100%;
            aspect-ratio: 3/4;
            background: linear-gradient(145deg, var(--bg-card), var(--bg-darkest));
            overflow: hidden;
        }

        .gallery-enamel::before {
            content: '';
            position: absolute;
            inset: 8px;
            border: 1px solid rgba(200, 164, 92, 0.1);
            pointer-events: none;
        }

        .gallery-enamel-placeholder {
            position: absolute;
            inset: 14px;
            background: var(--bg-darkest);
            border: 1px dashed var(--border-dim);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            font-size: 13px;
            letter-spacing: 2px;
        }

        .gallery-enamel-img {
            position: absolute;
            inset: 14px;
            object-fit: cover;
            display: none;
        }

        .gallery-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 4px 10px;
            font-size: 10px;
            border-radius: 10px;
            background: #4ecdc4;
            color: #0a0908;
            border: none;
            font-weight: 500;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        
        .gallery-badge-3d {
            top: auto;
            bottom: 10px;
            background: #c8a45c;
            color: #0a0908;
            border: none;
            font-weight: 500;
        }

        .gallery-info {
            padding: 20px;
            border-top: 1px solid var(--border-dim);
        }

        .gallery-name {
            font-size: 15px;
            color: var(--text-light);
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .gallery-meta {
            font-size: 12px;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .gallery-meta span {
            display: inline-block;
            margin-right: 15px;
        }

        .gallery-ethnic {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border-dim);
        }

        .ethnic-tag {
            display: inline-block;
            padding: 3px 10px;
            font-size: 10px;
            letter-spacing: 1px;
            border-radius: 10px;
            background: rgba(200, 164, 92, 0.15);
            color: var(--gold);
            margin-right: 5px;
            margin-bottom: 5px;
        }

        /* 详情弹窗 */
        .detail-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 9, 8, 0.95);
            z-index: 2000;
            display: none;
            overflow-y: auto;
            animation: fadeIn 0.3s ease;
        }

        .detail-content {
            max-width: 1000px;
            margin: 100px auto 50px;
            padding: 0 40px;
        }

        .detail-header {
            display: flex;
            gap: 40px;
            margin-bottom: 40px;
        }

        .detail-enamel {
            width: 350px;
            flex-shrink: 0;
        }

        .detail-enamel-frame {
            width: 100%;
            aspect-ratio: 3/4;
            background: linear-gradient(145deg, var(--bg-card), var(--bg-darkest));
            border: 2px solid var(--border-dim);
            border-radius: 4px;
            position: relative;
        }

        .detail-enamel-frame::before {
            content: '';
            position: absolute;
            inset: 10px;
            border: 1px solid rgba(200, 164, 92, 0.2);
        }

        .detail-enamel-placeholder {
            position: absolute;
            inset: 18px;
            background: var(--bg-darkest);
            border: 1px dashed var(--border-dim);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            font-size: 16px;
            letter-spacing: 3px;
        }

        .detail-info {
            flex: 1;
        }

        .detail-title {
            font-size: 32px;
            font-weight: 300;
            color: var(--gold);
            letter-spacing: 5px;
            margin-bottom: 15px;
        }

        .detail-subtitle {
            font-size: 14px;
            color: var(--text-dim);
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .detail-table {
            width: 100%;
            margin-bottom: 30px;
        }

        .detail-row {
            display: flex;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-dim);
        }

        .detail-label {
            width: 100px;
            color: var(--text-dim);
            font-size: 13px;
        }

        .detail-value {
            flex: 1;
            color: var(--text-light);
            font-size: 13px;
        }

        .detail-desc {
            padding: 25px;
            background: var(--bg-card);
            border: 1px solid var(--border-dim);
            border-radius: 8px;
        }

        .detail-desc-title {
            font-size: 14px;
            color: var(--gold);
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .detail-desc-text {
            font-size: 14px;
            color: var(--text-dim);
            line-height: 2;
        }

        .detail-model {
            margin-top: 40px;
        }

        .model-title {
            font-size: 14px;
            color: var(--gold);
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .model-container {
            width: 100%;
            height: 400px;
            background: var(--bg-card);
            border: 1px solid var(--border-dim);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            font-size: 14px;
            letter-spacing: 2px;
        }

        .close-btn {
            position: fixed;
            top: 30px;
            right: 40px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 1px solid var(--border-dim);
            color: var(--text-light);
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 2001;
        }

        .close-btn:hover {
            background: var(--vermillion);
            border-color: var(--vermillion);
        }

        @media (max-width: 1200px) {
            .gallery-grid { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 768px) {
            .gallery-grid { grid-template-columns: repeat(2, 1fr); }
            .detail-header { flex-direction: column; }
            .detail-enamel { width: 100%; }
        }

        /* 展厅导航按钮 */
        .hall-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 40px 0;
            border-top: 1px solid var(--border-dim);
            margin-top: 40px;
        }

        .hall-nav-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 15px 30px;
            background: var(--bg-card);
            border: 1px solid var(--border-dim);
            border-radius: 8px;
            color: var(--text-light);
            font-size: 14px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .hall-nav-btn:hover {
            border-color: var(--gold);
            background: rgba(200, 164, 92, 0.1);
            transform: translateY(-2px);
        }

        .hall-nav-btn.primary {
            background: linear-gradient(135deg, var(--gold), var(--vermillion));
            border-color: var(--gold);
            color: #fff;
        }

        .hall-nav-btn.primary:hover {
            box-shadow: 0 8px 25px rgba(200, 164, 92, 0.3);
        }

        .hall-nav-arrow {
            font-size: 18px;
        }
    </style>
</head>

    <!-- 详情弹窗 -->
    <div class="detail-modal" id="detailModal">

            <!-- 动态填充 -->

    <script src="js/data.js"></script>
    <script>
        // iframe内导航函数 - 通过postMessage保持音乐播放
        function navigateTo(url) {
            if (window.parent && window.parent !== window) {
                window.parent.postMessage({ type: 'navigate', url: url }, '*');
            } else {
                window.location.href = url;
            }
        }

        // 当前筛选条件
        let filters = { dynasty: 'all', region: 'all', type: 'all', protection: 'all', ethnic: 'all' };

        // 获取建筑数据
        function getBuildings() {
            return BUILDINGS || [];
        }

        // 获取所有民族列表
        function getAllEthnics() {
            const ethnics = new Set();
            getBuildings().forEach(b => {
                if (b.ethnic_groups && b.ethnic_groups.length > 0) {
                    b.ethnic_groups.forEach(e => ethnics.add(e));
                }
            });
            return Array.from(ethnics).sort((a, b) => {
                // 汉族排第一
                if (a === '汉族') return -1;
                if (b === '汉族') return 1;
                // 其他按拼音排序
                return a.localeCompare(b, 'zh-CN');
            });
        }

        // 初始化民族筛选器
        function initEthnicFilter() {
            const select = document.getElementById('filterEthnic');
            const ethnics = getAllEthnics();
            select.innerHTML = '<option value="all">全部</option>' + 
                ethnics.map(e => `<option value="${e}">${e}</option>`).join('');
        }

        // 简化类型
        function getSimpleType(type) {
            if (!type) return '其他';
            if (type.includes('桥')) return '桥梁';
            if (type.includes('民居') || type.includes('宅')) return '民居';
            if (type.includes('土司') || type.includes('衙署') || type.includes('司署')) return '衙署';
            return '其他';
        }

        // 简化保护级别
        function getProtectionLevel(protection) {
            if (!protection) return '其他';
            if (protection.includes('全国重点') || protection.includes('国保')) return '国保';
            if (protection.includes('省') || protection.includes('省级')) return '省保';
            if (protection.includes('市') || protection.includes('县') || protection.includes('区')) return '市县';
            return '其他';
        }

        // 筛选建筑
        function filterBuildings() {
            let filtered = getBuildings();
            
            if (filters.dynasty !== 'all') {
                filtered = filtered.filter(b => b.dynasty && b.dynasty.includes(filters.dynasty));
            }
            
            if (filters.region !== 'all') {
                if (filters.region === '其他') {
                    filtered = filtered.filter(b => {
                        const r = b.region || '';
                        return !r.includes('大理') && !r.includes('红河') && !r.includes('昆明') && !r.includes('保山') && !r.includes('丽江') && !r.includes('普洱');
                    });
                } else {
                    filtered = filtered.filter(b => b.region && b.region.includes(filters.region));
                }
            }
            
            if (filters.type !== 'all') {
                filtered = filtered.filter(b => getSimpleType(b.type) === filters.type);
            }
            
            if (filters.protection !== 'all') {
                filtered = filtered.filter(b => getProtectionLevel(b.protection_level) === filters.protection);
            }
            
            // 民族筛选 - 只要建筑涉及该民族就显示
            if (filters.ethnic !== 'all') {
                filtered = filtered.filter(b => {
                    const ethnics = b.ethnic_groups || [];
                    return ethnics.includes(filters.ethnic);
                });
            }
            
            // 优先展示有珐琅图的建筑
            filtered.sort((a, b) => {
                const hasEnamelA = getEnamelPath(a.name) ? 1 : 0;
                const hasEnamelB = getEnamelPath(b.name) ? 1 : 0;
                return hasEnamelB - hasEnamelA;
            });
            
            return filtered;
        }

        // 渲染建筑网格
        function renderGallery() {
            const grid = document.getElementById('galleryGrid');
            const buildings = filterBuildings();
            
            if (buildings.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 60px; color: var(--text-dim); letter-spacing: 2px;">暂无符合条件的建筑</div>';
                return;
            }
            
            grid.innerHTML = buildings.map(b => {
                const has3DModel = hasModel(b.name);
                const enamelPath = getEnamelPath(b.name);
                return `
                <div class="gallery-card" onclick="showDetail(${b.id})">
                    <div class="gallery-enamel">
                        ${enamelPath ? `
                            <img class="gallery-enamel-img" src="assets/enamels/${enamelPath}" alt="${b.name}" style="display:block; width:100%; height:100%; object-fit:cover;">
                        ` : `
                            <div class="gallery-enamel-placeholder">暂无图片</div>
                        `}
                        <span class="gallery-badge">${b.dynasty || '未知'}</span>
                        ${has3DModel ? '<span class="gallery-badge gallery-badge-3d">3D</span>' : ''}
                    </div>
                    <div class="gallery-info">
                        <div class="gallery-name">${b.name}</div>
                        <div class="gallery-meta">
                            <span>${b.region || '未知'}</span>
                            <span>${b.year_built || '待考'}年</span>
                        </div>
                        ${b.ethnic_groups && b.ethnic_groups.length > 0 ? `
                        <div class="gallery-ethnic">
                            ${b.ethnic_groups.map(e => `<span class="ethnic-tag">${e}</span>`).join('')}
                        </div>
                        ` : ''}
                    </div>
                </div>
                `;
            }).join('');
        }

        // 民族图标和颜色配置
        const ethnicInfo = {
            '汉族': { icon: 'assets/images/ethnic/汉族.png', color: '#c8a45c' },
            '白族': { icon: 'assets/images/ethnic/白族.png', color: '#5d7a6e' },
            '彝族': { icon: 'assets/images/ethnic/彝族.png', color: '#a43330' },
            '傣族': { icon: 'assets/images/ethnic/傣族.png', color: '#6b8e8e' },
            '壮族': { icon: 'assets/images/ethnic/壮族.png', color: '#7a9a5a' },
            '纳西族': { icon: 'assets/images/ethnic/纳西族.png', color: '#8b7355' },
            '藏族': { icon: 'assets/images/ethnic/藏族.png', color: '#7a6b8e' },
            '回族': { icon: 'assets/images/ethnic/回族.png', color: '#9c7a5c' },
            '哈尼族': { icon: 'assets/images/ethnic/哈尼族.png', color: '#5a8a6a' },
            '傈僳族': { icon: 'assets/images/ethnic/傈僳族.png', color: '#6a7a5a' },
            '苗族': { icon: 'assets/images/ethnic/苗族.png', color: '#a05a7a' },
            '佤族': { icon: 'assets/images/ethnic/佤族.png', color: '#5a5a5a' },
            '阿昌族': { icon: 'assets/images/ethnic/阿昌族.png', color: '#7a8a6a' },
            '独龙族': { icon: 'assets/images/ethnic/独龙族.png', color: '#5a6a7a' },
            '怒族': { icon: 'assets/images/ethnic/怒族.png', color: '#6a5a4a' }
        };

        // 可用的3D模型列表
        const AVAILABLE_MODELS = [
            "东莲花村民居", "中心镇公堂", "云龙桥", "依氏土司衙署（依氏土司府）",
            "保兴桥", "南甸宣抚司署", "双龙桥", "叶枝土司衙署",
            "和顺古镇（和顺传统民居建筑群）", "唐继尧故居", "喜洲白族古建築群", "团山民居建筑群",
            "复兴桥", "大回村马家大院", "天缘桥", "建水朱家花园",
            "整董傣族传统民居建筑群", "杜文秀元帅府", "灵官桥", "牛羊太平桥",
            "福春恒商号旧址", "老营李将军府", "艾思奇故居", "迪麻洛民族混合传统民居建筑群",
            "金龙桥", "陇西世族庄园", "鳳羽古建築群"
        ];

        // 珐琅图映射（建筑名 -> 文件名）
        const ENAMEL_MAP = {
            "陈氏民居": "陈氏民居 .png",
            "团山民居建筑群": "团山民居建筑群.png",
            "丙中洛民族混合传统民居建筑群": "丙中洛民族混合传统民居建筑群.png",
            "东莲花村民居": "东莲花村民居.png",
            "中心镇公堂": "中心镇公堂.png",
            "云龙桥": "云龙桥.png",
            "依氏土司衙署（依氏土司府）": "依氏土司衙署（依氏土司府）.png",
            "保兴桥": "保兴桥.png",
            "孟连宣抚司署": "孟连宣抚司署.png",
            "双虹桥": "双虹桥.png",
            "双龙桥": "双龙桥.png",
            "叶枝土司衙署": "叶枝土司衙署.png",
            "同乐傈僳族传统民居建筑群": "同乐傈僳族传统民居建筑群.png",
            "和顺古镇（和顺传统民居建筑群）": "和顺古镇（和顺传统民居建筑群）.png",
            "唐继尧故居": "唐继尧故居.png",
            "喜洲白族古建築群": "喜洲白族古建築群.png",
            "城子村民居": "城子村民居.png",
            "复兴桥": "复兴桥.png",
            "大回村马家大院": "大回村马家大院.png",
            "天缘桥": "天缘桥.png",
            "整董傣族传统民居建筑群": "整董傣族传统民居建筑群.png",
            "方国瑜故居": "方国瑜故居.png",
            "星宿桥和丰裕桥": "星宿桥和丰裕桥.png",
            "杜文秀元帅府": "杜文秀元帅府.png",
            "灵官桥": "灵官桥.png",
            "牛羊太平桥": "牛羊太平桥.png",
            "王氏宅院": "王氏宅院.png",
            "福春恒商号旧址": "福春恒商号旧址.png",
            "秋那桶怒族传统民居建筑群": "秋那桶怒族传统民居建筑群.png",
            "翁丁佤族传统民居建筑群": "翁丁佤族传统民居建筑群.png",
            "老营李将军府": "老营李将军府.png",
            "艾思奇故居": "艾思奇故居.png",
            "西门街古建筑群": "西门街古建筑群.png",
            "诺邓白族乡土建筑群": "诺邓白族乡土建筑群.png",
            "迤西军都督府旧址及靶园石刻": "迤西军都督府旧址及靶园石刻.png",
            "迪麻洛民族混合传统民居建筑群": "迪麻洛民族混合传统民居建筑群.png",
            "金龙桥": "金龙桥.png",
            "陇西世族庄园": "陇西世族庄园.png",
            "雾里怒族传统民居建筑群": "雾里怒族传统民居建筑群.png",
            "鲁史古镇（含戏楼等古建筑群）": "鲁史古镇（含戏楼等古建筑群）.png",
            "鳳羽古建築群": "鳳羽古建築群.png",
            "黑井武家大院": "黑井武家大院.png",
            "建水朱家花园": "建水朱家花园.png",
            "云南贡院": "云南贡院.png",
            "楚图南故居": "楚图南故居.png",
            "马家大院": "马家大院.png",
            "聂耳故居": "聂耳故居.png",
            "南甸宣抚司署": "南甸宣抚司署.png"
        };

        // 检查是否有3D模型
        function hasModel(name) {
            return AVAILABLE_MODELS.includes(name);
        }

        // 获取珐琅图路径
        function getEnamelPath(name) {
            return ENAMEL_MAP[name] || null;
        }

        // 显示详情
        function showDetail(id) {
            const b = getBuildings().find(x => x.id === id);
            if (!b) return;
            
            const has3DModel = hasModel(b.name);
            const enamelPath = getEnamelPath(b.name);
            
            const content = document.getElementById('detailContent');
            content.innerHTML = `
                <div class="detail-header">
                    <div class="detail-enamel">
                        <div class="detail-enamel-frame">
                            ${enamelPath ? `
                                <img src="assets/enamels/${enamelPath}" alt="${b.name}" style="width:100%; height:100%; object-fit:contain;">
                            ` : `
                                <div class="detail-enamel-placeholder">暂无图片</div>
                            `}
                        </div>
                    </div>
                    <div class="detail-info">
                        <h2 class="detail-title">${b.name}</h2>
                        <div class="detail-subtitle">${b.region || ''} · ${b.district || ''}</div>
                        ${has3DModel ? '<span class="model-badge">✨ 已有3D模型</span>' : ''}
                        
                        <div class="detail-table">
                            <div class="detail-row">
                                <span class="detail-label">始建年份</span>
                                <span class="detail-value">${b.year_built || '待考'}年</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">朝代</span>
                                <span class="detail-value">${b.dynasty || '未知'}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">建筑类型</span>
                                <span class="detail-value">${b.type || '未知'}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">保护级别</span>
                                <span class="detail-value">${b.protection_level || '未知'}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">结构类型</span>
                                <span class="detail-value">${b.structure_type || '未知'}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">涉及民族</span>
                                <span class="detail-value">${b.ethnic_groups && b.ethnic_groups.length > 0 ? b.ethnic_groups.join('、') : '汉族'}</span>
                            </div>
                            ${b.ethnic_groups && b.ethnic_groups.length > 0 ? `
                            <div class="detail-row" style="padding-top: 5px;">
                                <span class="detail-label"></span>
                                <span class="detail-value" style="display: flex; gap: 15px; flex-wrap: wrap; align-items: center;">
                                    ${b.ethnic_groups.map(e => {
                                        const info = ethnicInfo[e];
                                        if (info && info.icon) {
                                            return `<div style="text-align: center;" title="${e}">
                                                <img src="${info.icon}" alt="${e}" style="width: 40px; height: 40px; object-fit: contain; border-radius: 50%; border: 2px solid ${info.color}; padding: 2px;" onerror="this.style.display='none'">
                                                <div style="font-size: 10px; color: var(--text-dim); margin-top: 4px;">${e}</div>
                                            </div>`;
                                        }
                                        return '';
                                    }).join('')}
                                </span>
                            </div>
                            ` : ''}
                        </div>
                        
                        <div class="detail-desc">
                            <div class="detail-desc-title">建筑简介</div>
                            <div class="detail-desc-text">${b.description || '暂无详细描述'}</div>
                        </div>
                    </div>
                </div>
                
                <div class="detail-model">
                    <div class="model-title">3D模型展示</div>
                    ${has3DModel ? `
                        <div class="model-viewer-container">
                            <model-viewer 
                                src="assets/models/${b.name}.glb" 
                                alt="${b.name} 3D模型"
                                camera-controls 
                                auto-rotate
                                shadow-intensity="1"
                                exposure="1"
                                camera-orbit="0deg 75deg 2.5m"
                                max-camera-orbit="auto 90deg auto"
                            ></model-viewer>
                        </div>
                        <div class="model-controls">
                            <button class="model-btn" onclick="zoomIn()">放大 +</button>
                            <button class="model-btn" onclick="zoomOut()">缩小 -</button>
                            <button class="model-btn" onclick="resetCamera()">重置视角</button>
                            <button class="model-btn" onclick="toggleAutoRotate()">自动旋转</button>
                        </div>
                    ` : `
                        <div class="model-container">
                            暂无3D模型
                        </div>
                    `}
                </div>
            `;
            
            document.getElementById('detailModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        // 关闭详情
        function closeDetail() {
            document.getElementById('detailModal').style.display = 'none';
            document.body.style.overflow = '';
        }

        // 重置3D模型视角
        function resetCamera() {
            const modelViewer = document.querySelector('model-viewer');
            if (modelViewer) {
                modelViewer.cameraOrbit = '0deg 75deg 2.5m';
            }
        }

        // 切换自动旋转
        function toggleAutoRotate() {
            const modelViewer = document.querySelector('model-viewer');
            if (modelViewer) {
                modelViewer.autoRotate = !modelViewer.autoRotate;
            }
        }

        // 放大模型
        function zoomIn() {
            const modelViewer = document.querySelector('model-viewer');
            if (modelViewer) {
                const orbit = modelViewer.cameraOrbit;
                const match = orbit.match(/([\d.]+)(m)$/);
                if (match) {
                    const currentDistance = parseFloat(match[1]);
                    const newDistance = Math.max(1, currentDistance - 0.5);
                    modelViewer.cameraOrbit = orbit.replace(/[\d.]+m$/, newDistance + 'm');
                }
            }
        }

        // 缩小模型
        function zoomOut() {
            const modelViewer = document.querySelector('model-viewer');
            if (modelViewer) {
                const orbit = modelViewer.cameraOrbit;
                const match = orbit.match(/([\d.]+)(m)$/);
                if (match) {
                    const currentDistance = parseFloat(match[1]);
                    const newDistance = Math.min(10, currentDistance + 0.5);
                    modelViewer.cameraOrbit = orbit.replace(/[\d.]+m$/, newDistance + 'm');
                }
            }
        }

        // 筛选事件
        document.getElementById('filterDynasty').addEventListener('change', function(e) {
            filters.dynasty = e.target.value;
            renderGallery();
        });

        document.getElementById('filterRegion').addEventListener('change', function(e) {
            filters.region = e.target.value;
            renderGallery();
        });

        document.getElementById('filterType').addEventListener('change', function(e) {
            filters.type = e.target.value;
            renderGallery();
        });

        document.getElementById('filterProtection').addEventListener('change', function(e) {
            filters.protection = e.target.value;
            renderGallery();
        });

        document.getElementById('filterEthnic').addEventListener('change', function(e) {
            filters.ethnic = e.target.value;
            renderGallery();
        });

        // ESC关闭详情
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeDetail();
        });

        // 重置筛选条件
        function resetFilters() {
            // 重置筛选条件对象
            filters = { dynasty: 'all', region: 'all', type: 'all', protection: 'all', ethnic: 'all' };
            
            // 重置所有下拉框
            document.getElementById('filterDynasty').value = 'all';
            document.getElementById('filterRegion').value = 'all';
            document.getElementById('filterType').value = 'all';
            document.getElementById('filterProtection').value = 'all';
            document.getElementById('filterEthnic').value = 'all';
            
            // 重新渲染建筑列表
            renderGallery();
        }

        // 重置按钮点击事件
        document.getElementById('resetFilters').addEventListener('click', resetFilters);

        // 初始化
        initEthnicFilter();
        renderGallery();
        
        // 动态设置建筑数量
        document.getElementById('totalBuildingsCount').textContent = getBuildings().length;
        
        // 处理URL参数
        const urlParams = new URLSearchParams(window.location.search);
        const buildingId = urlParams.get('id');
        const typeParam = urlParams.get('type');
        
        // 如果有类型参数，设置筛选器
        if (typeParam) {
            const typeSelect = document.getElementById('filterType');
            // 映射类型参数到筛选器选项
            const typeMapping = {
                '桥梁': '桥梁',
                '民居': '民居',
                '衙署': '衙署',
                '寺庙': '其他',
                '楼阁': '其他',
                '牌坊': '其他',
                '商业': '其他',
                '官式': '其他',
                '其他': '其他'
            };
            const filterValue = typeMapping[typeParam] || 'all';
            if (filterValue !== 'all') {
                filters.type = filterValue;
                typeSelect.value = filterValue;
                renderGallery();
            }
        }
        
        // 如果有建筑ID参数，自动打开详情
        if (buildingId) {
            setTimeout(() => {
                showDetail(parseInt(buildingId));
            }, 300);
        }
    </script>
</body>
</html>
