<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地理长卷 - 滇风·民族筑语</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .map-section {
            display: flex;
            gap: 20px;
            padding: 15px 0;
            height: calc(100vh - 220px);
            min-height: 500px;
        }

        .map-sidebar {
            width: 320px;
            flex-shrink: 0;
            overflow-y: auto;
            padding-right: 10px;
        }

        .map-main {
            flex: 1;
            position: relative;
            background: var(--bg-card);
            border: 1px solid var(--border-dim);
            border-radius: 8px;
            overflow: hidden;
            min-height: 0;
        }

        .search-box {
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-dim);
            border-radius: 4px;
            color: var(--text-light);
            font-family: var(--font-serif);
            font-size: 14px;
            transition: all 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--gold);
        }

        .search-input::placeholder {
            color: var(--text-dim);
        }

        .filter-section {
            margin-bottom: 20px;
        }

        .filter-title {
            font-size: 12px;
            color: var(--text-dim);
            letter-spacing: 2px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .filter-clear {
            color: var(--gold);
            cursor: pointer;
            font-size: 11px;
        }

        .filter-clear:hover {
            text-decoration: underline;
        }

        .filter-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .filter-tag {
            padding: 6px 14px;
            font-size: 11px;
            letter-spacing: 1px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid var(--border-dim);
            color: var(--text-dim);
            background: transparent;
        }

        .filter-tag:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .filter-tag.active {
            background: var(--gold);
            border-color: var(--gold);
            color: var(--bg-darkest);
        }

        .building-list {
            max-height: calc(100vh - 450px);
            overflow-y: auto;
        }

        .building-item {
            padding: 15px;
            background: var(--bg-card);
            border: 1px solid var(--border-dim);
            border-radius: 6px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .building-item:hover {
            border-color: var(--gold);
            transform: translateX(5px);
        }

        .building-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .building-item-name {
            font-size: 14px;
            color: var(--text-light);
            letter-spacing: 1px;
        }

        .building-item-dynasty {
            font-size: 10px;
            padding: 3px 10px;
            border-radius: 10px;
            background: rgba(78, 205, 196, 0.2);
            color: #4ecdc4;
        }

        .building-item-meta {
            font-size: 11px;
            color: var(--text-dim);
        }

        #mapContainer {
            width: 100%;
            height: 100%;
        }

        .info-popup {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 320px;
            max-height: calc(100vh - 60px);
            overflow-y: auto;
            background: rgba(26, 24, 22, 0.97);
            border: 1px solid var(--border-dim);
            border-radius: 8px;
            padding: 25px;
            padding-bottom: 30px;
            display: none;
            z-index: 100;
            animation: slideIn 0.3s ease;
            box-sizing: border-box;
        }
        
        /* 自定义滚动条 */
        .info-popup::-webkit-scrollbar {
            width: 6px;
        }
        
        .info-popup::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }
        
        .info-popup::-webkit-scrollbar-thumb {
            background: rgba(200, 164, 92, 0.3);
            border-radius: 3px;
        }
        
        .info-popup::-webkit-scrollbar-thumb:hover {
            background: rgba(200, 164, 92, 0.5);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-dim);
        }

        .popup-title {
            font-size: 18px;
            color: var(--gold);
            letter-spacing: 2px;
        }

        .popup-close {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: var(--text-light);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .popup-close:hover {
            background: var(--vermillion);
        }

        .popup-row {
            display: flex;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .popup-label {
            width: 80px;
            color: var(--text-dim);
        }

        .popup-value {
            flex: 1;
            color: var(--text-light);
        }

        .popup-enamel {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border-dim);
        }

        .popup-enamel-img {
            width: 100%;
            height: 160px;
            object-fit: contain;
            border-radius: 4px;
            background: linear-gradient(145deg, var(--bg-card), var(--bg-darkest));
            border: 1px solid var(--border-dim);
        }

        .popup-enamel-placeholder {
            width: 100%;
            height: 160px;
            background: linear-gradient(145deg, var(--bg-card), var(--bg-darkest));
            border: 1px solid var(--border-dim);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            font-size: 12px;
            letter-spacing: 1px;
        }

        .popup-description {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border-dim);
            font-size: 12px;
            color: var(--text-dim);
            line-height: 1.8;
            max-height: 80px;
            overflow-y: auto;
        }

        .popup-protection {
            display: inline-block;
            margin-top: 8px;
            padding: 3px 10px;
            font-size: 10px;
            border-radius: 10px;
            background: rgba(200, 164, 92, 0.2);
            color: var(--gold);
        }

        .popup-actions {
            position: sticky;
            bottom: 0;
            margin-top: 15px;
            padding-top: 15px;
            padding-bottom: 5px;
            border-top: 1px solid var(--border-dim);
            display: flex;
            gap: 10px;
            background: rgba(26, 24, 22, 0.97);
        }

        .popup-btn {
            flex: 1;
            padding: 10px;
            font-size: 12px;
            letter-spacing: 1px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            text-decoration: none;
        }

        .popup-btn-primary {
            background: var(--gold);
            color: var(--bg-darkest);
            border: 1px solid var(--gold);
        }

        .popup-btn-primary:hover {
            background: transparent;
            color: var(--gold);
        }

        .popup-btn-secondary {
            background: transparent;
            color: var(--text-light);
            border: 1px solid var(--border-dim);
        }

        .popup-btn-secondary:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .map-legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(26, 24, 22, 0.97);
            border: 1px solid var(--border-dim);
            border-radius: 8px;
            padding: 15px 20px;
            z-index: 100;
        }

        .legend-title {
            font-size: 12px;
            color: var(--gold);
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 12px;
            color: var(--text-light);
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }

        .stats-summary {
            display: flex;
            gap: 20px;
            padding: 15px;
            background: var(--bg-darkest);
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .stats-item {
            text-align: center;
        }

        .stats-num {
            font-size: 24px;
            font-weight: 200;
            color: var(--gold);
        }

        .stats-label {
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        @media (max-width: 1200px) {
            .map-section { flex-direction: column; }
            .map-sidebar { width: 100%; }
            .map-main { min-height: 500px; }
        }

        /* 展厅导航按钮 */
        .hall-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 40px 0;
            border-top: 1px solid var(--border-dim);
            margin-top: 20px;
        }

        .hall-nav-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 15px 30px;
            background: var(--bg-card);
            border: 1px solid var(--border-dim);
            border-radius: 8px;
            color: var(--text-light);
            font-size: 14px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .hall-nav-btn:hover {
            border-color: var(--gold);
            background: rgba(200, 164, 92, 0.1);
            transform: translateY(-2px);
        }

        .hall-nav-btn.primary {
            background: linear-gradient(135deg, var(--gold), var(--vermillion));
            border-color: var(--gold);
            color: #fff;
        }

        .hall-nav-btn.primary:hover {
            box-shadow: 0 8px 25px rgba(200, 164, 92, 0.3);
        }

        .hall-nav-arrow {
            font-size: 18px;
        }
    </style>
</head>

    <script src="js/data.js"></script>
    <!-- 高德地图 JS API - 延迟加载优化 -->
    <script>
        // iframe内导航函数 - 通过postMessage保持音乐播放
        function navigateTo(url) {
            if (window.parent && window.parent !== window) {
                window.parent.postMessage({ type: 'navigate', url: url }, '*');
            } else {
                window.location.href = url;
            }
        }

        // 获取建筑列表
        function getBuildings() {
            return BUILDINGS || [];
        }

        // 提取州市名称（简化）
        function getPrefecture(region) {
            if (!region) return '未知';
            if (region.includes('大理')) return '大理州';
            if (region.includes('怒江')) return '怒江州';
            if (region.includes('红河')) return '红河州';
            if (region.includes('文山')) return '文山州';
            if (region.includes('保山')) return '保山市';
            if (region.includes('楚雄')) return '楚雄州';
            if (region.includes('昆明')) return '昆明市';
            if (region.includes('丽江')) return '丽江市';
            if (region.includes('迪庆')) return '迪庆州';
            if (region.includes('玉溪')) return '玉溪市';
            if (region.includes('普洱')) return '普洱市';
            if (region.includes('临沧')) return '临沧市';
            if (region.includes('曲靖')) return '曲靖市';
            return '其他';
        }

        // 当前筛选条件
        let currentFilters = { region: 'all', dynasty: 'all', type: 'all' };
        
        // 云南省各州市中心坐标
        const prefectureCenters = {
            '大理州': [100.27, 25.59],
            '怒江州': [98.85, 26.85],
            '红河州': [103.38, 23.37],
            '文山州': [104.25, 23.37],
            '保山市': [99.16, 25.12],
            '楚雄州': [101.55, 25.03],
            '昆明市': [102.72, 25.04],
            '丽江市': [100.23, 26.86],
            '迪庆州': [99.70, 27.83],
            '玉溪市': [102.55, 24.35],
            '普洱市': [100.97, 22.78],
            '临沧市': [100.09, 23.88],
            '曲靖市': [103.80, 25.49],
            '其他': [101.5, 25.0]
        };
        
        // 州市边界数据（从阿里云 DataV API 加载）
        let prefectureBoundaries = {};
        let yunnanBoundaryData = null; // 云南省边界数据
        let yunnanGeoData = null; // 缓存完整数据
        
        // 州市名称映射（API返回的名称 -> 简化名称）
        const prefectureNameMap = {
            '大理白族自治州': '大理州',
            '怒江傈僳族自治州': '怒江州',
            '红河哈尼族彝族自治州': '红河州',
            '文山壮族苗族自治州': '文山州',
            '保山市': '保山市',
            '楚雄彝族自治州': '楚雄州',
            '昆明市': '昆明市',
            '丽江市': '丽江市',
            '迪庆藏族自治州': '迪庆州',
            '玉溪市': '玉溪市',
            '普洱市': '普洱市',
            '临沧市': '临沧市',
            '曲靖市': '曲靖市',
            '昭通市': '昭通市',
            '西双版纳傣族自治州': '西双版纳州',
            '德宏傣族景颇族自治州': '德宏州'
        };
        
        // 从阿里云 DataV API 加载云南省边界数据
        async function loadYunnanGeoData() {
            try {
                console.log('正在加载云南省行政区划数据...');
                
                // 加载州市边界数据
                const response = await fetch('assets/data/530000_full.json');
                const data = await response.json();
                yunnanGeoData = data;
                
                // 解析各州市边界
                if (data.features) {
                    data.features.forEach(feature => {
                        const fullName = feature.properties.name;
                        const shortName = prefectureNameMap[fullName] || fullName;
                        
                        // 提取边界坐标
                        if (feature.geometry) {
                            const coordinates = feature.geometry.coordinates;
                            prefectureBoundaries[shortName] = coordinates;
                        }
                    });
                }
                
                console.log('云南省行政区划数据加载完成，共', Object.keys(prefectureBoundaries).length, '个州市');
                
                // 加载云南省省级边界数据
                await loadYunnanProvinceBoundary();
                
                return true;
            } catch (e) {
                console.error('加载云南省行政区划数据失败:', e);
                return false;
            }
        }
        
        // 加载云南省省级边界
        async function loadYunnanProvinceBoundary() {
            try {
                console.log('正在加载云南省省级边界...');
                const response = await fetch('assets/data/530000.json');
                const data = await response.json();
                yunnanBoundaryData = data;
                console.log('云南省省级边界数据加载完成');
            } catch (e) {
                console.error('加载云南省省级边界失败:', e);
            }
        }
        
        // 绘制云南省边界
        function drawYunnanProvinceBoundary() {
            if (!map || !yunnanBoundaryData) {
                console.log('无法绘制云南省边界：地图或数据未就绪');
                return;
            }
            
            // 清除旧的云南省边界
            if (yunnanPolygon) {
                map.remove(yunnanPolygon);
                yunnanPolygon = null;
            }
            
            const coordinates = yunnanBoundaryData.features[0].geometry.coordinates;
            const path = convertGeoJSONCoordinates(coordinates);
            
            if (!path || path.length === 0) {
                console.log('转换云南省边界坐标失败');
                return;
            }
            
            yunnanPolygon = new AMap.Polygon({
                path: path,
                fillColor: '#c8a45c',
                fillOpacity: 0.08,
                strokeColor: '#c8a45c',
                strokeWeight: 2.5,
                strokeOpacity: 0.7,
                zIndex: 1,
                map: map
            });
            
            // 调整地图视野以完全显示云南省边界
            map.setFitView([yunnanPolygon], false, [20, 20, 20, 20]);
            
            console.log('云南省边界绘制完成，坐标点数:', path.length);
        }

        // 统计州市分布
        function getRegionStats() {
            const buildings = getBuildings();
            const stats = {};
            buildings.forEach(b => {
                const prefecture = getPrefecture(b.region);
                stats[prefecture] = (stats[prefecture] || 0) + 1;
            });
            return stats;
        }

        // 渲染州市筛选按钮
        function renderRegionFilters() {
            const stats = getRegionStats();
            const container = document.getElementById('regionFilters');
            
            // 按数量排序
            const sorted = Object.entries(stats).sort((a, b) => b[1] - a[1]);
            
            container.innerHTML = `
                <span class="filter-tag active" data-filter="region" data-value="all">全部 (${getBuildings().length})</span>
                ${sorted.map(([name, count]) => `
                    <span class="filter-tag" data-filter="region" data-value="${name}">${name} (${count})</span>
                `).join('')}
            `;
            
            // 绑定事件
            container.querySelectorAll('.filter-tag').forEach(tag => {
                tag.addEventListener('click', function() {
                    container.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    currentFilters.region = this.dataset.value;
                    applyFilters();
                });
            });
        }

        // 筛选建筑
        function filterBuildings() {
            let filtered = getBuildings();
            
            // 州市筛选
            if (currentFilters.region !== 'all') {
                filtered = filtered.filter(b => getPrefecture(b.region) === currentFilters.region);
            }
            
            // 朝代筛选（按最早出现的朝代）
            if (currentFilters.dynasty !== 'all') {
                filtered = filtered.filter(b => {
                    const dynasty = b.dynasty || '';
                    // 按时间顺序判断最早的朝代
                    if (currentFilters.dynasty === '明') {
                        // 只显示最早为明代的（不包含清、民国）
                        return dynasty.includes('明') && !dynasty.includes('清') && !dynasty.includes('民国');
                    }
                    if (currentFilters.dynasty === '清') {
                        // 只显示最早为清代的（不包含明、民国）
                        return dynasty.includes('清') && !dynasty.includes('明') && !dynasty.includes('民国');
                    }
                    if (currentFilters.dynasty === '民国') {
                        // 只显示民国的
                        return dynasty.includes('民国') && !dynasty.includes('明') && !dynasty.includes('清');
                    }
                    return dynasty.includes(currentFilters.dynasty);
                });
            }
            
            // 类型筛选
            if (currentFilters.type !== 'all') {
                filtered = filtered.filter(b => {
                    const t = b.type || '';
                    if (currentFilters.type === '桥梁') return t.includes('桥');
                    if (currentFilters.type === '民居') return t.includes('民居') || t.includes('宅');
                    if (currentFilters.type === '衙署') return t.includes('土司') || t.includes('衙署') || t.includes('司署');
                    return false;
                });
            }
            
            return filtered;
        }

        // 更新地图标记
        function updateMapMarkers() {
            if (!map) return;

            // 清除旧标记
            markers.forEach(m => map.remove(m));
            markers = [];
            
            // 清除旧的州市区域多边形
            if (prefecturePolygon) {
                map.remove(prefecturePolygon);
                prefecturePolygon = null;
            }

            const buildings = filterBuildings().filter(b => b.location);

            buildings.forEach(b => {
                const marker = new AMap.Marker({
                    position: [b.location.lng, b.location.lat],
                    title: b.name,
                    content: `<div style="
                        width: 16px;
                        height: 16px;
                        background: ${getDynastyColor(b.dynasty)};
                        border-radius: 50%;
                        border: 2px solid rgba(255,255,255,0.5);
                        cursor: pointer;
                        box-shadow: 0 2px 6px rgba(0,0,0,0.3);
                    "></div>`
                });

                marker.on('click', () => showBuildingInfo(b.id));
                map.add(marker);
                markers.push(marker);
            });

            // 根据筛选条件调整地图视野
            if (currentFilters.region !== 'all' && prefectureCenters[currentFilters.region]) {
                // 选择了特定州市
                const regionName = currentFilters.region;
                
                // 绘制州市区域高亮（使用真实边界数据）
                drawPrefecturePolygon(regionName);
                
                // 调整地图视野以完全显示该州市，并适当放大
                if (prefecturePolygon) {
                    map.setFitView([prefecturePolygon], false, [50, 50, 50, 50]);
                } else {
                    // 如果没有边界数据，只移动中心
                    map.setCenter(prefectureCenters[regionName]);
                }
            } else {
                // 全部建筑时，显示云南省全貌
                if (yunnanPolygon) {
                    map.setFitView([yunnanPolygon], false, [20, 20, 20, 20]);
                } else if (buildings.length > 0) {
                    map.setFitView(markers, false, [50, 50, 50, 50]);
                }
            }
        }

        // 将 GeoJSON 坐标转换为高德地图格式
        function convertGeoJSONCoordinates(coordinates) {
            // GeoJSON 格式可能是多层嵌套：MultiPolygon -> Polygon -> Ring -> Points
            // 高德地图需要的是 [[[lng, lat], ...]] 格式
            
            const result = [];
            
            // 判断是 Polygon 还是 MultiPolygon
            if (typeof coordinates[0][0][0] === 'number') {
                // Polygon: coordinates 是 [Ring1, Ring2, ...]
                // Ring 是 [[lng, lat], ...]
                return coordinates[0]; // 返回外环
            } else {
                // MultiPolygon: coordinates 是 [Polygon1, Polygon2, ...]
                // 取最大的 Polygon（通常是主体部分）
                let maxLen = 0;
                let mainRing = null;
                
                coordinates.forEach(polygon => {
                    if (polygon[0] && polygon[0].length > maxLen) {
                        maxLen = polygon[0].length;
                        mainRing = polygon[0];
                    }
                });
                
                return mainRing || coordinates[0][0];
            }
        }
        
        // 绘制州市区域多边形
        function drawPrefecturePolygon(regionName) {
            if (!prefectureBoundaries[regionName]) {
                console.log('未找到州市边界数据:', regionName);
                return;
            }
            
            const coordinates = prefectureBoundaries[regionName];
            const path = convertGeoJSONCoordinates(coordinates);
            
            if (!path || path.length === 0) {
                console.log('转换边界坐标失败:', regionName);
                return;
            }
            
            prefecturePolygon = new AMap.Polygon({
                path: path,
                fillColor: '#4ecdc4',
                fillOpacity: 0.2,
                strokeColor: '#4ecdc4',
                strokeWeight: 2,
                strokeOpacity: 0.8,
                zIndex: 5,
                map: map
            });
            
            console.log('绘制州市区域:', regionName, '坐标点数:', path.length);
        }

        // 页面加载完成后初始化
        window.onload = async function() {
            // 动态设置建筑总数
            document.getElementById('totalCount').textContent = getBuildings().length;
            
            // 先渲染列表和筛选器（不依赖地图）
            renderRegionFilters();
            renderBuildingList();
            updateStats();
            
            // 延迟加载地图API和边界数据（优化首屏加载速度）
            setTimeout(async function() {
                // 动态加载高德地图API
                const script = document.createElement('script');
                script.src = 'https://webapi.amap.com/maps?v=2.0&key=47a7a341cd9c9eeacabe61f405b930c5';
                script.onload = async function() {
                    // 加载州市边界数据
                    await loadYunnanGeoData();
                    // 初始化地图
                    initMap();
                };
                script.onerror = function() {
                    document.getElementById('mapContainer').innerHTML = `
                        <div style="display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-dim); font-size: 14px; letter-spacing: 2px; text-align: center; padding: 20px;">
                            地图 API 加载失败<br><br>请检查网络连接或刷新页面重试
                        </div>
                    `;
                };
                document.head.appendChild(script);
            }, 300); // 延迟300ms加载地图，让页面先渲染
        };
    </script>
</body>
</html>
