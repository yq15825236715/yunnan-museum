<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>建筑万象 - 滇韵古建</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/echarts.min.js"></script>
    <style>
        .type-section { margin-bottom: 50px; }
        
        .type-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-dim);
        }
        
        .type-icon {
            font-size: 36px;
        }
        
        .type-info h3 {
            font-size: 24px;
            color: var(--gold);
            letter-spacing: 3px;
            margin-bottom: 5px;
        }
        
        .type-info p {
            font-size: 13px;
            color: var(--text-dim);
        }
        
        .type-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
        }
        
        .type-card {
            background: var(--bg-card);
            border: 1px solid var(--border-dim);
            border-radius: 8px;
            padding: 25px;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .type-card:hover {
            border-color: var(--gold);
            transform: translateY(-5px);
        }
        
        .type-card-title {
            font-size: 16px;
            color: var(--text-light);
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        
        .type-card-meta {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 15px;
        }
        
        .type-card-desc {
            font-size: 13px;
            color: var(--text-dim);
            line-height: 1.8;
        }
        
        .type-card-enamel {
            width: 120px;
            height: 150px;
            background: linear-gradient(145deg, var(--bg-card), var(--bg-darkest));
            border: 1px solid var(--border-dim);
            float: right;
            margin-left: 20px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: var(--text-dim);
            overflow: hidden;
            border-radius: 4px;
        }

        .type-card-enamel img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .chart-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            margin-bottom: 50px;
        }

        .chart-container {
            background: var(--bg-card);
            border: 1px solid var(--border-dim);
            border-radius: 8px;
            padding: 25px;
        }

        .chart-title {
            font-size: 16px;
            color: var(--text-light);
            letter-spacing: 3px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-dim);
        }
        
        .type-card-more {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, var(--bg-card), var(--bg-darkest));
            border: 1px dashed var(--border-dim);
        }
        
        .type-card-more:hover {
            border: 1px solid var(--gold);
            background: var(--bg-card);
        }
        
        .type-card-more-content {
            text-align: center;
        }
        
        .type-card-more-icon {
            display: block;
            font-size: 32px;
            color: var(--gold);
            margin-bottom: 10px;
        }
        
        .type-card-more-text {
            font-size: 14px;
            color: var(--text-dim);
            letter-spacing: 1px;
        }
        
        .type-card-more:hover .type-card-more-text {
            color: var(--gold);
        }
        
        @media (max-width: 1000px) {
            .type-cards { grid-template-columns: repeat(2, 1fr); }
            .chart-row { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            .type-cards { grid-template-columns: 1fr; }
        }

        /* 展厅导航按钮 */
        .hall-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 40px 0;
            border-top: 1px solid var(--border-dim);
            margin-top: 40px;
        }

        .hall-nav-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 15px 30px;
            background: var(--bg-card);
            border: 1px solid var(--border-dim);
            border-radius: 8px;
            color: var(--text-light);
            font-size: 14px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .hall-nav-btn:hover {
            border-color: var(--gold);
            background: rgba(200, 164, 92, 0.1);
            transform: translateY(-2px);
        }

        .hall-nav-btn.primary {
            background: linear-gradient(135deg, var(--gold), var(--vermillion));
            border-color: var(--gold);
            color: #fff;
        }

        .hall-nav-btn.primary:hover {
            box-shadow: 0 8px 25px rgba(200, 164, 92, 0.3);
        }

        .hall-nav-arrow {
            font-size: 18px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-logo" onclick="navigateTo('home.html')">
            <div class="nav-logo-icon"><img src="assets/icons/icon.png" alt="滇"></div>
            <span class="nav-logo-text">滇韵古建</span>
        </div>
        <div class="nav-links">
            <a href="javascript:void(0)" class="nav-link" onclick="navigateTo('home.html')">首页</a>
            <a href="javascript:void(0)" class="nav-link" onclick="navigateTo('hall-timeline.html')">时光长廊</a>
            <a href="javascript:void(0)" class="nav-link" onclick="navigateTo('hall-map.html')">地理长卷</a>
            <div class="nav-dropdown">
                <span class="nav-link">更多展厅 ▾</span>
                <div class="nav-dropdown-menu">
                    <a href="javascript:void(0)" onclick="navigateTo('hall-types.html')">建筑万象</a>
                    <a href="javascript:void(0)" onclick="navigateTo('hall-ethnic.html')">民族交融</a>
                    <a href="javascript:void(0)" onclick="navigateTo('hall-tech.html')">匠心传承</a>
                    <a href="javascript:void(0)" onclick="navigateTo('hall-protection.html')">守护重生</a>
                    <a href="javascript:void(0)" onclick="navigateTo('hall-insights.html')">回望·尾声</a>
                    <a href="javascript:void(0)" onclick="navigateTo('hall-gallery.html')">建筑图鉴</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            <div class="section-header">
                <div class="section-badge">展厅三</div>
                <h1 class="section-title">建 筑 万 象</h1>
                <p class="section-subtitle">桥梁、民居、衙署...类型丰富多彩</p>
            </div>

            <!-- 类型统计图表 -->
            <div class="chart-row">
                <div class="chart-container">
                    <div class="chart-title">建筑类型分布</div>
                    <div id="typePieChart" style="height: 300px;"></div>
                </div>
                <div class="chart-container">
                    <div class="chart-title">类型年代分布</div>
                    <div id="typeBarChart" style="height: 300px;"></div>
                </div>
            </div>

            <!-- 建筑类型年代演变 -->
            <div class="section-header" style="padding: 40px 0 20px;">
                <div class="section-badge">年代演变</div>
                <h2 class="section-title" style="font-size: 24px;">建筑类型年代演变</h2>
                <p class="section-subtitle">不同历史时期各建筑类型的发展变化</p>
            </div>
            <div class="chart-row" style="margin-bottom: 50px;">
                <div class="chart-container" style="grid-column: span 2;">
                    <div id="typeTimelineChart" style="height: 350px;"></div>
                </div>
            </div>

            <!-- 地区建筑类型雷达图 -->
            <div class="section-header" style="padding: 40px 0 20px;">
                <div class="section-badge">地区分布</div>
                <h2 class="section-title" style="font-size: 24px;">各州市建筑类型分布</h2>
                <p class="section-subtitle">选择州市查看该地区不同建筑类型的数量分布</p>
            </div>
            <div class="charts-row" style="display: grid; grid-template-columns: 200px 1fr; gap: 30px; margin-bottom: 50px;">
                <div class="region-selector" style="background: var(--bg-card); border: 1px solid var(--border-dim); border-radius: 8px; padding: 15px; max-height: 400px; overflow-y: auto;">
                    <div style="font-size: 14px; color: var(--gold); letter-spacing: 2px; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid var(--border-dim);">选择州市</div>
                    <div id="regionList" style="display: flex; flex-direction: column; gap: 5px;"></div>
                </div>
                <div class="chart-container" style="background: var(--bg-card); border: 1px solid var(--border-dim); border-radius: 8px; padding: 25px;">
                    <div class="chart-title" id="radarChartTitle">昆明市建筑类型分布</div>
                    <div id="regionRadarChart" style="height: 350px;"></div>
                </div>
            </div>

            <!-- 建筑类型卡片将由JS动态生成 -->
            <div id="typeSections"></div>

            <!-- 展厅导航 -->
            <div class="hall-nav">
                <a href="javascript:void(0)" class="hall-nav-btn" onclick="navigateTo('hall-map.html')">
                    <span class="hall-nav-arrow">←</span>
                    <span>上一展厅：地理长卷</span>
                </a>
                <a href="javascript:void(0)" class="hall-nav-btn primary" onclick="navigateTo('hall-ethnic.html')">
                    <span>进入下一展厅：民族交融</span>
                    <span class="hall-nav-arrow">→</span>
                </a>
            </div>
        </div>
    </main>

    <script src="js/data.js"></script>
    <script>
        // iframe内导航函数 - 通过postMessage保持音乐播放
        function navigateTo(url) {
            if (window.parent && window.parent !== window) {
                window.parent.postMessage({ type: 'navigate', url: url }, '*');
            } else {
                window.location.href = url;
            }
        }

        // 获取建筑数据
        const buildings = BUILDINGS || [];

        // 解析建筑类型
        function parseBuildingType(type) {
            if (!type) return '其他';
            const typeStr = type.toLowerCase();
            if (typeStr.includes('桥')) return '桥梁';
            if (typeStr.includes('民居') || typeStr.includes('住宅')) return '民居';
            if (typeStr.includes('衙署') || typeStr.includes('土司') || typeStr.includes('宣抚')) return '衙署';
            if (typeStr.includes('寺庙') || typeStr.includes('佛寺') || typeStr.includes('教堂')) return '寺庙';
            if (typeStr.includes('楼') || typeStr.includes('阁')) return '楼阁';
            if (typeStr.includes('牌坊')) return '牌坊';
            if (typeStr.includes('商号') || typeStr.includes('商铺')) return '商业';
            if (typeStr.includes('官式') || typeStr.includes('贡院')) return '官式';
            return '其他';
        }

        // 按类型分组
        const typeGroups = {};
        buildings.forEach(b => {
            const type = parseBuildingType(b.type);
            if (!typeGroups[type]) {
                typeGroups[type] = [];
            }
            typeGroups[type].push(b);
        });

        // 类型图标
        const typeIcons = {
            '桥梁': '🌉',
            '民居': '🏠',
            '衙署': '🏛️',
            '寺庙': '⛩️',
            '楼阁': '🏯',
            '牌坊': '🚪',
            '商业': '🏪',
            '官式': '🏛️',
            '其他': '🏛️'
        };

        // 类型描述
        const typeDescriptions = {
            '桥梁': '石拱桥、廊桥、风雨桥...连接古今的交通纽带',
            '民居': '传统民居、名人故居、商贾宅院...生活的艺术',
            '衙署': '土司衙署、宣抚司署...权力的象征',
            '寺庙': '佛教寺庙、道教宫观...信仰的空间',
            '楼阁': '钟楼、鼓楼、文昌阁...城市的地标',
            '牌坊': '功德坊、贞节坊、状元坊...荣誉的见证',
            '商业': '商号、商铺、会馆...商业的记忆',
            '官式': '贡院、官署...官方建筑的典范',
            '其他': '其他类型的古建筑'
        };

        // 检查建筑是否有珐琅图
        function hasEnamelImage(name) {
            const enamelFiles = [
                "东莲花村民居", "中心镇公堂", "云龙桥", "依氏土司衙署（依氏土司府）",
                "保兴桥", "南甸宣抚司署", "双龙桥", "叶枝土司衙署",
                "和顺古镇（和顺传统民居建筑群）", "唐继尧故居", "喜洲白族古建築群", "团山民居建筑群",
                "复兴桥", "大回村马家大院", "天缘桥", "建水朱家花园",
                "整董傣族传统民居建筑群", "杜文秀元帅府", "灵官桥", "牛羊太平桥",
                "福春恒商号旧址", "老营李将军府", "艾思奇故居", "迪麻洛民族混合传统民居建筑群",
                "金龙桥", "陇西世族庄园", "鳳羽古建築群", "陈氏民居",
                "丙中洛民族混合传统民居建筑群", "孟连宣抚司署", "双虹桥", "同乐傈僳族传统民居建筑群",
                "城子村民居", "方国瑜故居", "星宿桥和丰裕桥", "王氏宅院",
                "秋那桶怒族传统民居建筑群", "翁丁佤族传统民居建筑群", "西门街古建筑群", "诺邓白族乡土建筑群",
                "迤西军都督府旧址及靶园石刻", "雾里怒族传统民居建筑群", "鲁史古镇（含戏楼等古建筑群）",
                "黑井武家大院", "朱家花园", "云南贡院"
            ];
            return enamelFiles.includes(name);
        }

        // 渲染类型分区
        function renderTypeSections() {
            const container = document.getElementById('typeSections');
            const sortedTypes = Object.entries(typeGroups).sort((a, b) => b[1].length - a[1].length);

            container.innerHTML = sortedTypes.map(([type, items]) => {
                // 按是否有珐琅图排序，有珐琅图的优先
                const sortedItems = [...items].sort((a, b) => {
                    const hasEnamelA = hasEnamelImage(a.name) ? 1 : 0;
                    const hasEnamelB = hasEnamelImage(b.name) ? 1 : 0;
                    return hasEnamelB - hasEnamelA;
                });
                
                return `
                <div class="type-section">
                    <div class="type-header">
                        <div class="type-info">
                            <h3>${type}建筑 · ${items.length}座</h3>
                            <p>${typeDescriptions[type] || ''}</p>
                        </div>
                    </div>
                    <div class="type-cards">
                        ${sortedItems.slice(0, 4).map(b => `
                            <div class="type-card">
                                <div class="type-card-enamel" onclick="window.location.href='hall-gallery.html?id=${b.id}'">
                                    ${getEnamelImage(b.name)}
                                </div>
                                <div class="type-card-title">${b.name}</div>
                                <div class="type-card-meta">${b.dynasty || ''} · ${b.region || ''}</div>
                                <div class="type-card-desc">${(b.description || '').substring(0, 80)}...</div>
                            </div>
                        `).join('')}
                        <div class="type-card type-card-more" onclick="goToGalleryWithType('${type}')">
                            <div class="type-card-more-content">
                                <span class="type-card-more-icon">→</span>
                                <span class="type-card-more-text">查看全部${type}建筑</span>
                            </div>
                        </div>
                    </div>
                </div>
            `}).join('');
        }
        
        // 跳转到建筑图鉴页面并设置类型筛选
        function goToGalleryWithType(type) {
            window.location.href = `hall-gallery.html?type=${encodeURIComponent(type)}`;
        }

        // 获取珐琅图
        function getEnamelImage(name) {
            const enamelPath = `assets/enamels/${name}.png`;
            return `<img src="${enamelPath}" alt="${name}" onerror="this.parentElement.innerHTML='珐琅图'">`;
        }

        // 类型饼图
        const typePieChart = echarts.init(document.getElementById('typePieChart'));
        const pieData = Object.entries(typeGroups).map(([name, items]) => ({
            value: items.length,
            name: name
        })).sort((a, b) => b.value - a.value);

        const colors = ['#c8a45c', '#5d7a6e', '#a43330', '#4ecdc4', '#6b8e8e', '#8b7355', '#9c7a5c', '#7a8b6e', '#a05a7a'];

        typePieChart.setOption({
            backgroundColor: 'transparent',
            tooltip: { trigger: 'item', formatter: '{b}: {c}座 ({d}%)' },
            legend: {
                orient: 'vertical',
                right: 20,
                top: 'center',
                textStyle: { color: '#9a958a', fontSize: 11 }
            },
            series: [{
                type: 'pie',
                radius: ['35%', '60%'],
                center: ['35%', '50%'],
                data: pieData.map((d, i) => ({
                    ...d,
                    itemStyle: { color: colors[i % colors.length] }
                })),
                label: {
                    formatter: '{b}\n{c}座',
                    color: '#e8e4da',
                    fontSize: 11
                },
                itemStyle: {
                    borderRadius: 4,
                    borderColor: '#0a0908',
                    borderWidth: 2
                }
            }]
        });

        // 类型年代柱状图
        const typeBarChart = echarts.init(document.getElementById('typeBarChart'));

        // 统计各类型各年代数量
        const dynastyTypeData = {};
        const mainTypes = Object.keys(typeGroups).slice(0, 5);

        buildings.forEach(b => {
            const type = parseBuildingType(b.type);
            const dynasty = b.dynasty || '';
            let period = null;
            if (dynasty.includes('明')) period = '明代';
            else if (dynasty.includes('清')) period = '清代';
            else if (dynasty.includes('民国')) period = '民国';
            else if (dynasty.includes('元')) period = '元代';
            else if (dynasty.includes('宋') || dynasty.includes('南宋')) period = '宋代';

            // 只统计有明确年代的建筑
            if (period) {
                if (!dynastyTypeData[period]) dynastyTypeData[period] = {};
                dynastyTypeData[period][type] = (dynastyTypeData[period][type] || 0) + 1;
            }
        });

        const periods = ['明代', '清代'];
        const seriesData = mainTypes.map((type, idx) => ({
            name: type,
            type: 'bar',
            data: periods.map(p => dynastyTypeData[p]?.[type] || 0),
            itemStyle: { color: colors[idx] }
        }));

        typeBarChart.setOption({
            backgroundColor: 'transparent',
            tooltip: { trigger: 'axis' },
            legend: {
                data: mainTypes,
                top: 10,
                textStyle: { color: '#9a958a', fontSize: 10 }
            },
            grid: { left: 50, right: 20, top: 50, bottom: 40 },
            xAxis: {
                type: 'category',
                data: periods,
                axisLine: { lineStyle: { color: 'rgba(200, 164, 92, 0.3)' } },
                axisLabel: { color: '#9a958a' }
            },
            yAxis: {
                type: 'value',
                axisLine: { show: false },
                splitLine: { lineStyle: { color: 'rgba(200, 164, 92, 0.1)' } },
                axisLabel: { color: '#9a958a' }
            },
            series: seriesData
        });

        // 地区建筑类型雷达图
        let regionRadarChart = null;
        let currentRegion = '昆明市';

        // 统计各州市各类型建筑数量
        const regionTypeData = {};
        buildings.forEach(b => {
            const region = b.region || '未知';
            const type = parseBuildingType(b.type);
            if (!regionTypeData[region]) {
                regionTypeData[region] = {};
            }
            regionTypeData[region][type] = (regionTypeData[region][type] || 0) + 1;
        });

        // 获取所有类型（用于雷达图维度）
        const allTypes = Object.keys(typeGroups).sort((a, b) => typeGroups[b].length - typeGroups[a].length).slice(0, 8);

        // 获取所有州市并按建筑数量排序
        const allRegions = Object.keys(regionTypeData).sort((a, b) => {
            const sumA = Object.values(regionTypeData[a]).reduce((x, y) => x + y, 0);
            const sumB = Object.values(regionTypeData[b]).reduce((x, y) => x + y, 0);
            return sumB - sumA;
        });

        // 渲染州市列表
        function renderRegionList() {
            const container = document.getElementById('regionList');
            container.innerHTML = allRegions.map(region => {
                const count = Object.values(regionTypeData[region]).reduce((x, y) => x + y, 0);
                return `
                    <div class="region-item ${region === currentRegion ? 'active' : ''}" 
                         data-region="${region}"
                         style="padding: 8px 12px; cursor: pointer; border-radius: 4px; 
                                font-size: 13px; color: ${region === currentRegion ? 'var(--gold)' : 'var(--text-dim)'};
                                background: ${region === currentRegion ? 'rgba(200, 164, 92, 0.1)' : 'transparent'};
                                transition: all 0.3s;">
                        <span>${region}</span>
                        <span style="float: right; font-size: 11px; opacity: 0.7;">${count}座</span>
                    </div>
                `;
            }).join('');

            // 绑定点击事件
            container.querySelectorAll('.region-item').forEach(item => {
                item.addEventListener('click', function() {
                    currentRegion = this.dataset.region;
                    renderRegionList();
                    updateRadarChart();
                });

                item.addEventListener('mouseenter', function() {
                    if (this.dataset.region !== currentRegion) {
                        this.style.background = 'rgba(200, 164, 92, 0.05)';
                    }
                });

                item.addEventListener('mouseleave', function() {
                    if (this.dataset.region !== currentRegion) {
                        this.style.background = 'transparent';
                    }
                });
            });
        }

        // 初始化雷达图
        function initRadarChart() {
            regionRadarChart = echarts.init(document.getElementById('regionRadarChart'));
            updateRadarChart();
        }

        // 更新雷达图
        function updateRadarChart() {
            const data = regionTypeData[currentRegion] || {};
            const maxCount = Math.max(...Object.values(data), 5);

            document.getElementById('radarChartTitle').textContent = `${currentRegion}建筑类型分布`;

            regionRadarChart.setOption({
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'item',
                    formatter: function(params) {
                        const values = params.data.value;
                        let html = `<strong style="color:#c8a45c">${currentRegion}</strong><br/>`;
                        allTypes.forEach((type, i) => {
                            if (values[i] > 0) {
                                html += `${type}: ${values[i]}座<br/>`;
                            }
                        });
                        return html;
                    }
                },
                radar: {
                    indicator: allTypes.map(type => ({
                        name: type,
                        max: maxCount + 2
                    })),
                    center: ['50%', '55%'],
                    radius: '65%',
                    axisName: {
                        color: '#9a958a',
                        fontSize: 11
                    },
                    splitArea: {
                        areaStyle: {
                            color: ['rgba(200, 164, 92, 0.02)', 'rgba(200, 164, 92, 0.05)']
                        }
                    },
                    axisLine: {
                        lineStyle: { color: 'rgba(200, 164, 92, 0.2)' }
                    },
                    splitLine: {
                        lineStyle: { color: 'rgba(200, 164, 92, 0.15)' }
                    }
                },
                series: [{
                    type: 'radar',
                    data: [{
                        value: allTypes.map(type => data[type] || 0),
                        name: currentRegion,
                        symbol: 'circle',
                        symbolSize: 6,
                        lineStyle: {
                            color: '#c8a45c',
                            width: 2
                        },
                        areaStyle: {
                            color: 'rgba(200, 164, 92, 0.3)'
                        },
                        itemStyle: {
                            color: '#c8a45c'
                        }
                    }]
                }]
            });
        }

        // 建筑类型年代演变图 - 折线图（按始建年份）
        const typeTimelineChart = echarts.init(document.getElementById('typeTimelineChart'));

        // 按始建年份分组统计各类型数量
        const yearTypeData = {};
        buildings.forEach(b => {
            const year = b.year_built;
            if (!year || year < 1300 || year > 1950) return; // 只统计有效年份范围内的建筑
            
            const type = parseBuildingType(b.type);
            if (!yearTypeData[year]) yearTypeData[year] = {};
            yearTypeData[year][type] = (yearTypeData[year][type] || 0) + 1;
        });

        // 获取所有年份并排序
        const allYears = Object.keys(yearTypeData).map(Number).sort((a, b) => a - b);
        
        // 按时间段分组（每20年为一个时间段）
        const periodData = {};
        allYears.forEach(year => {
            const periodStart = Math.floor(year / 20) * 20;
            const periodLabel = `${periodStart}-${periodStart + 19}`;
            if (!periodData[periodLabel]) {
                periodData[periodLabel] = { year: periodStart, types: {} };
            }
            const types = yearTypeData[year];
            Object.keys(types).forEach(type => {
                periodData[periodLabel].types[type] = (periodData[periodLabel].types[type] || 0) + types[type];
            });
        });

        // 获取时间段标签并按年份排序
        const periodLabels = Object.keys(periodData).sort((a, b) => periodData[a].year - periodData[b].year);
        
        // 获取所有建筑类型
        const allTypesList = Object.keys(typeGroups).sort((a, b) => typeGroups[b].length - typeGroups[a].length);

        // 计算累计数量（用于展示演变趋势）
        const cumulativeData = {};
        allTypesList.forEach(type => {
            cumulativeData[type] = [];
            let cumulative = 0;
            periodLabels.forEach(label => {
                cumulative += periodData[label].types[type] || 0;
                cumulativeData[type].push(cumulative);
            });
        });

        typeTimelineChart.setOption({
            backgroundColor: 'transparent',
            title: {
                text: '建筑类型年代演变',
                subtext: '按始建年份统计，展示各建筑类型的累计数量变化趋势',
                left: 'center',
                top: 5,
                textStyle: { color: '#e8e4da', fontSize: 14 },
                subtextStyle: { color: '#9a958a', fontSize: 11 }
            },
            tooltip: {
                trigger: 'axis',
                axisPointer: { type: 'cross' },
                formatter: function(params) {
                    let html = `<strong style="color:#c8a45c">${params[0].axisValue}</strong><br/>`;
                    params.forEach(p => {
                        if (p.value > 0) {
                            html += `${p.marker} ${p.seriesName}: ${p.value}座<br/>`;
                        }
                    });
                    return html;
                }
            },
            legend: {
                data: allTypesList,
                top: 50,
                textStyle: { color: '#9a958a', fontSize: 10 },
                type: 'scroll',
                pageTextStyle: { color: '#9a958a' }
            },
            grid: { left: 60, right: 30, top: 100, bottom: 80 },
            xAxis: {
                type: 'category',
                data: periodLabels,
                axisLine: { lineStyle: { color: 'rgba(200, 164, 92, 0.3)' } },
                axisLabel: { 
                    color: '#9a958a', 
                    fontSize: 10,
                    rotate: 45,
                    interval: 0
                },
                boundaryGap: false
            },
            yAxis: {
                type: 'value',
                name: '累计建筑数量',
                nameTextStyle: { color: '#9a958a' },
                axisLine: { show: false },
                splitLine: { lineStyle: { color: 'rgba(200, 164, 92, 0.1)' } },
                axisLabel: { color: '#9a958a' }
            },
            dataZoom: [
                {
                    type: 'slider',
                    start: 0,
                    end: 100,
                    bottom: 10,
                    height: 20,
                    borderColor: 'rgba(200, 164, 92, 0.3)',
                    backgroundColor: 'rgba(10, 9, 8, 0.5)',
                    fillerColor: 'rgba(200, 164, 92, 0.2)',
                    handleStyle: { color: '#c8a45c' },
                    textStyle: { color: '#9a958a', fontSize: 10 }
                },
                {
                    type: 'inside',
                    start: 0,
                    end: 100
                }
            ],
            series: allTypesList.map((type, idx) => ({
                name: type,
                type: 'line',
                smooth: true,
                symbol: 'circle',
                symbolSize: 6,
                data: cumulativeData[type],
                lineStyle: { color: colors[idx % colors.length], width: 2 },
                itemStyle: { color: colors[idx % colors.length] },
                areaStyle: {
                    color: {
                        type: 'linear',
                        x: 0, y: 0, x2: 0, y2: 1,
                        colorStops: [
                            { offset: 0, color: colors[idx % colors.length] + '40' },
                            { offset: 1, color: colors[idx % colors.length] + '05' }
                        ]
                    }
                },
                emphasis: {
                    focus: 'series',
                    itemStyle: {
                        shadowBlur: 10,
                        shadowColor: colors[idx % colors.length]
                    }
                }
            }))
        });

        // 初始化
        renderRegionList();
        initRadarChart();

        // 渲染类型分区
        renderTypeSections();

        // 响应式
        window.addEventListener('resize', () => {
            typePieChart.resize();
            typeBarChart.resize();
            typeTimelineChart.resize();
            if (regionRadarChart) regionRadarChart.resize();
        });
    </script>
</body>
</html>
